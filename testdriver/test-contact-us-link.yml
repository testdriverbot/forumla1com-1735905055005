version: 4.1.32
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on the "About us" or any section with contact options.
    commands:
      - command: hover-text
        text: About us
        description: about us section in the top navigation bar
        action: click
  - prompt: >-
      Assert that the contact details or form are displayed.  # Use the content
      of the file from the environment
    commands:
      - command: assert
        expect: contact information is displayed
